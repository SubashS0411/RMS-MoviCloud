<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Urban Bites - Restaurant Management System</title>
    <meta name="description" content="A comprehensive restaurant management system for handling menus, orders, kitchen operations, inventory, and staff management." />
    <!-- PWA / Mobile Web App -->
    <meta name="theme-color" content="#8B5A2B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RMS" />
    <meta name="application-name" content="RMS" />
    <!-- Auto-upgrade HTTP sub-resource requests (images, scripts) to HTTPS.
         Fixes mixed-content warnings for menu item images stored with http:// URLs. -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <!-- Restore URL after 404.html redirect (SPA deep-link fallback) -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('rms_redirect_path');
        if (redirect) {
          sessionStorage.removeItem('rms_redirect_path');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
